<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #111; color: #fff; flex-direction: column; gap: 20px; }
        h1 { color: #00a884; }
        #board { display: grid; grid-template-columns: repeat(3, 100px); grid-template-rows: repeat(3, 100px); gap: 5px; }
        .cell { background-color: #222; border: 2px solid #444; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 2.5rem; font-weight: bold; cursor: pointer; user-select: none; }
        .cell:hover { background-color: #2a2a2a; }
        #status { font-size: 1.2rem; font-weight: bold; min-height: 30px; }
        button { padding: 10px 20px; font-size: 1rem; background-color: #00a884; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #008f72; }
    </style>
</head>
<body>
    <h1>Tic-Tac-Toe</h1>
    <div id="status">Spieler X ist dran</div>
    <div id="board">
        <div class="cell" onclick="makeMove(this, 0)"></div>
        <div class="cell" onclick="makeMove(this, 1)"></div>
        <div class="cell" onclick="makeMove(this, 2)"></div>
        <div class="cell" onclick="makeMove(this, 3)"></div>
        <div class="cell" onclick="makeMove(this, 4)"></div>
        <div class="cell" onclick="makeMove(this, 5)"></div>
        <div class="cell" onclick="makeMove(this, 6)"></div>
        <div class="cell" onclick="makeMove(this, 7)"></div>
        <div class="cell" onclick="makeMove(this, 8)"></div>
    </div>
    <button onclick="resetGame()">Neu starten</button>
<script>
    let board = ["", "", "", "", "", "", "", "", ""];
    let currentPlayer = "X";
    let gameActive = true;
    const winConditions = [[0,1,2], [3,4,5], [6,7,8], [0,3,6], [1,4,7], [2,5,8], [0,4,8], [2,4,6]];
    function makeMove(cell, index) {
        if (board[index] !== "" || !gameActive) return;
        board[index] = currentPlayer;
        cell.textContent = currentPlayer;
        cell.style.color = currentPlayer === "X" ? "#00a884" : "#0284c7";
        checkResult();
    }
    function checkResult() {
        let roundWon = false;
        for (let i = 0; i < winConditions.length; i++) {
            const [a, b, c] = winConditions[i];
            if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                roundWon = true;
                break;
            }
        }
        if (roundWon) {
            document.getElementById('status').textContent = `🎉 Spieler ${currentPlayer} gewinnt!`;
            gameActive = false;
            return;
        }
        if (!board.includes("")) {
            document.getElementById('status').textContent = "Unentschieden! 🤝";
            gameActive = false;
            return;
        }
        currentPlayer = currentPlayer === "X" ? "O" : "X";
        document.getElementById('status').textContent = `Spieler ${currentPlayer} ist dran`;
    }
    function resetGame() {
        board = ["", "", "", "", "", "", "", "", ""];
        currentPlayer = "X";
        gameActive = true;
        document.getElementById('status').textContent = "Spieler X ist dran";
        document.querySelectorAll('.cell').forEach(cell => cell.textContent = "");
    }
</script>
</body>
</html>
