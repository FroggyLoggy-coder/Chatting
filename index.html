<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #111; color: #fff; }
        #chat-container { width: 100%; max-width: 500px; height: 90vh; background: #222; display: flex; flex-direction: column; border-radius: 8px; overflow: hidden; }
        #header { background: #333; padding: 15px; text-align: center; font-weight: bold; border-bottom: 1px solid #444; }
        #setup-area { padding: 20px; display: flex; flex-direction: column; gap: 15px; justify-content: center; height: 100%; }
        #chat-area { display: none; flex-direction: column; height: 100%; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #111; }
        .msg { max-width: 80%; padding: 10px; border-radius: 8px; word-wrap: break-word; }
        .msg.sent { background-color: #005c4b; align-self: flex-end; }
        .msg.received { background-color: #333; align-self: flex-start; }
        #input-area { padding: 15px; background: #333; display: flex; gap: 10px; }
        input, button { padding: 12px; border: none; border-radius: 6px; font-size: 1rem; }
        input { background: #444; color: #fff; width: 100%; }
        input:focus { outline: none; }
        button { background: #00a884; color: white; cursor: pointer; font-weight: bold; }
        .error { color: #ff4a4a; font-size: 0.9rem; text-align: center; display: none; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">Chat</div>
    
    <div id="setup-area">
        <p style="text-align: center; font-weight: bold;">Registrierung / Login</p>
        
        <p style="font-size: 0.9rem; color: #aaa;">Gib deine gewünschte Friend-Code-Zahl ein (6 bis 9 Ziffern):</p>
        <div style="display: flex; align-items: center; gap: 5px;">
            <input type="number" id="my-fc-number" placeholder="z.B. 123456" min="100000" max="999999999">
            <span style="font-weight: bold; font-size: 1.2rem; color: #00a884;">.fc</span>
        </div>

        <p style="font-size: 0.9rem; color: #aaa;">Dein Name im Chat:</p>
        <input type="text" id="username" placeholder="Dein Name...">

        <hr style="border-color: #444; margin: 10px 0;">

        <p style="font-size: 0.9rem; color: #aaa;">Friend Code des Freundes (Zahl eingeben):</p>
        <div style="display: flex; align-items: center; gap: 5px;">
            <input type="number" id="friend-fc-number" placeholder="Code des Freundes...">
            <span style="font-weight: bold; font-size: 1.2rem; color: #333;">.fc</span>
        </div>

        <div id="setup-error" class="error"></div>
        <button onclick="startChat()">Registrieren & Verbinden</button>
    </div>

    <div id="chat-area">
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="message-input" placeholder="Nachricht..." onkeypress="checkEnter(event)">
            <button onclick="sendMessage()">Senden</button>
        </div>
    </div>
</div>

<script>
    let myRoom = "";
    let myName = "";
    let lastTimestamp = 0;
    let pollInterval = null;

    function startChat() {
        const myFc = document.getElementById('my-fc-number').value.trim();
        myName = document.getElementById('username').value.trim();
        const friendFc = document.getElementById('friend-fc-number').value.trim();
        const errorDiv = document.getElementById('setup-error');

        errorDiv.style.display = "none";

        // Überprüfung der Länge (Mehr als 5, weniger als 10 Zeichen)
        if (myFc.length < 6 || myFc.length > 9 || friendFc.length < 6 || friendFc.length > 9) {
            errorDiv.innerText = "Fehler: Die Zahlen müssen zwischen 6 und 9 Stellen lang sein!";
            errorDiv.style.display = "block";
            return;
        }

        if (!myName) {
            errorDiv.innerText = "Bitte gib deinen Namen ein!";
            errorDiv.style.display = "block";
            return;
        }

        // Raum-ID wird aus beiden Codes generiert, damit beide im selben Raum landen
        const codes = [myFc, friendFc].sort();
        myRoom = "room_" + codes[0] + "_" + codes[1];

        document.getElementById('setup-area').style.display = 'none';
        document.getElementById('chat-area').style.display = 'flex';

        // Nachrichten-Abfrage alle 2 Sekunden starten (ohne Lade-Hänger)
        getMessages();
        pollInterval = setInterval(getMessages, 2000);
    }

    function sendMessage() {
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        
        if (!text) return;

        const msgData = {
            sender: myName,
            text: text,
            timestamp: Date.now()
        };

        // Speichern über eine freie, universelle KV-Repository-API
        fetch(`https://p3k.io{myRoom}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(msgData)
        })
        .then(() => {
            input.value = '';
            getMessages();
        })
        .catch(err => console.error("Sende-Fehler:", err));
    }

    function getMessages() {
        fetch(`https://p3k.io{myRoom}`)
        .then(response => {
            if (response.status === 404) return [];
            return response.json();
        })
        .then(data => {
            // Falls die API ein einzelnes Objekt liefert, machen wir ein Array daraus
            const messages = Array.isArray(data) ? data : [data];
            const messagesDiv = document.getElementById('messages');
            
            // Nur aktualisieren, wenn neue Nachrichten da sind
            if (messages.length > 0) {
                messagesDiv.innerHTML = "";
                messages.forEach(msg => {
                    if (msg.sender && msg.text) {
                        const type = (msg.sender === myName) ? 'sent' : 'received';
                        const msgElement = document.createElement('div');
                        msgElement.classList.add('msg', type);
                        msgElement.innerText = (type === 'received' ? msg.sender + ": " : "") + msg.text;
                        messagesDiv.appendChild(msgElement);
                    }
                });
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
        })
        .catch(err => console.error("Lade-Fehler:", err));
    }

    function checkEnter(event) {
        if (event.key === 'Enter') { sendMessage(); }
    }
</script>

</body>
</html>
