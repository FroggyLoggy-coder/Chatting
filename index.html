<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #111; color: #fff; }
        #chat-container { width: 100%; max-width: 500px; height: 90vh; background: #222; display: flex; flex-direction: column; border-radius: 8px; overflow: hidden; }
        #header { background: #333; padding: 15px; text-align: center; font-weight: bold; border-bottom: 1px solid #444; display: flex; justify-content: space-between; align-items: center; }
        #back-btn { background: none; color: #00a884; font-size: 1rem; display: none; }
        .area { padding: 20px; display: flex; flex-direction: column; gap: 15px; justify-content: center; height: 100%; }
        #list-area, #chat-area { display: none; padding: 0; }
        #chat-list { display: flex; flex-direction: column; height: 100%; overflow-y: auto; }
        .chat-item { display: flex; align-items: center; gap: 15px; padding: 15px; border-bottom: 1px solid #333; cursor: pointer; transition: 0.2s; }
        .chat-item:hover { background: #2a2a2a; }
        .chat-avatar { width: 45px; height: 45px; background: #444; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; }
        .chat-info { flex: 1; }
        .chat-name { font-weight: bold; font-size: 1rem; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #111; }
        .msg { max-width: 80%; padding: 10px; border-radius: 8px; word-wrap: break-word; line-height: 1.4; }
        .msg.sent { background-color: #005c4b; align-self: flex-end; }
        .msg.received { background-color: #333; align-self: flex-start; }
        #input-area { padding: 15px; background: #333; display: flex; gap: 10px; }
        input, button { padding: 12px; border: none; border-radius: 6px; font-size: 1rem; }
        input { background: #444; color: #fff; width: 100%; }
        input:focus { outline: none; }
        button { background: #00a884; color: white; cursor: pointer; font-weight: bold; }
        .error { color: #ff4a4a; font-size: 0.9rem; text-align: center; display: none; }
    </style>
</head>
<body>
<div id="chat-container">
    <div id="header">
        <button id="back-btn" onclick="showChatList()">‹ Zurück</button>
        <span id="header-title">Registrieren</span>
        <span style="width: 50px;"></span>
    </div>
    <div id="login-area" class="area">
        <p style="font-size: 0.9rem; color: #aaa;">Wähle deine eigene Nummer (6 bis 9 Zahlen):</p>
        <input type="number" id="my-fc-number" placeholder="Deine Nummer...">
        <p style="font-size: 0.9rem; color: #aaa;">Dein Name im Chat:</p>
        <input type="text" id="username" placeholder="Dein Name...">
        <div id="login-error" class="error"></div>
        <button onclick="registerAndLogin()">Registrieren</button>
    </div>
    <div id="list-area" class="area">
        <div style="padding: 15px; display: flex; gap: 10px; border-bottom: 1px solid #333;">
            <input type="number" id="new-friend-fc" placeholder="Freund-Nummer hinzufügen...">
            <button onclick="addFriendChat()">+</button>
        </div>
        <div id="chat-list"></div>
    </div>
    <div id="chat-area" class="area">
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="message-input" placeholder="Nachricht..." onkeypress="checkEnter(event)">
            <button onclick="sendMessage()">Senden</button>
        </div>
    </div>
</div>
<script>
    let myFc = "";
    let myName = "";
    let activeChatId = "";
    let chats = {};
    function registerAndLogin() {
        myFc = document.getElementById('my-fc-number').value.trim();
        myName = document.getElementById('username').value.trim();
        const errorDiv = document.getElementById('login-error');
        if (myFc.length < 6 || myFc.length > 9 || !myName) {
            errorDiv.innerText = "Fehler: Ungültige Daten!";
            errorDiv.style.display = "block";
            return;
        }
        chats["self_" + myFc] = { name: "Notiz an mich", isSelf: true, messages: [], avatar: "📝" };
        loadSavedChats();
        showChatList();
    }
    function showChatList() {
        document.getElementById('login-area').style.display = 'none';
        document.getElementById('chat-area').style.display = 'none';
        document.getElementById('back-btn').style.display = 'none';
        document.getElementById('list-area').style.display = 'flex';
        document.getElementById('header-title').innerText = "Chats";
        renderChatList();
    }
    function renderChatList() {
        const listDiv = document.getElementById('chat-list');
        listDiv.innerHTML = "";
        Object.keys(chats).forEach(id => {
            const chat = chats[id];
            const item = document.createElement('div');
            item.classList.add('chat-item');
            item.onclick = () => openChat(id);
            item.innerHTML = `<div class="chat-avatar">${chat.avatar}</div><div class="chat-info"><div class="chat-name">${chat.name}</div></div>`;
            listDiv.appendChild(item);
        });
    }
    function addFriendChat() {
        const friendFc = document.getElementById('new-friend-fc').value.trim();
        if (friendFc.length < 6 || friendFc.length > 9 || friendFc === myFc) return;
        const chatId = "friend_" + friendFc;
        if (!chats[chatId]) {
            chats[chatId] = { name: friendFc + ".fc", isSelf: false, messages: [], avatar: "👤" };
            saveChatsToStorage();
            renderChatList();
        }
        document.getElementById('new-friend-fc').value = "";
    }
    function openChat(id) {
        activeChatId = id;
        document.getElementById('list-area').style.display = 'none';
        document.getElementById('chat-area').style.display = 'flex';
        document.getElementById('back-btn').style.display = 'block';
        document.getElementById('header-title').innerText = chats[id].name;
        renderMessages();
    }
    function sendMessage() {
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        if (!text || !activeChatId) return;
        chats[activeChatId].messages.push({ sender: myName, text: text });
        saveChatsToStorage();
        renderMessages();
        input.value = '';
    }
    function renderMessages() {
        const messagesDiv = document.getElementById('messages');
        messagesDiv.innerHTML = "";
        const currentChat = chats[activeChatId];
        currentChat.messages.forEach(msg => {
            const type = (currentChat.isSelf || msg.sender === myName) ? 'sent' : 'received';
            const msgElement = document.createElement('div');
            msgElement.classList.add('msg', type);
            msgElement.innerText = text = msg.text;
            messagesDiv.appendChild(msgElement);
        });
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    function saveChatsToStorage() {
        localStorage.setItem('stored_chats_' + myFc, JSON.stringify(chats));
    }
    function loadSavedChats() {
        const saved = localStorage.getItem('stored_chats_' + myFc);
        if (saved) { chats = JSON.parse(saved); }
    }
    function checkEnter(event) { if (event.key === 'Enter') { sendMessage(); } }
</script>
</body>
</html>
