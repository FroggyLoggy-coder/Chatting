<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <!-- Stabile Bibliothek für Direktverbindungen -->
    <script src="https://cloudflare.com"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #111; color: #fff; }
        #chat-container { width: 100%; max-width: 500px; height: 90vh; background: #222; display: flex; flex-direction: column; border-radius: 8px; overflow: hidden; }
        #header { background: #333; padding: 15px; text-align: center; font-weight: bold; border-bottom: 1px solid #444; }
        #setup-area { padding: 20px; display: flex; flex-direction: column; gap: 15px; justify-content: center; height: 100%; }
        #chat-area { display: none; flex-direction: column; height: 100%; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #111; }
        .msg { max-width: 80%; padding: 10px; border-radius: 8px; word-wrap: break-word; }
        .msg.sent { background-color: #005c4b; align-self: flex-end; }
        .msg.received { background-color: #333; align-self: flex-start; }
        #input-area { padding: 15px; background: #333; display: flex; gap: 10px; }
        input, button, textarea { padding: 12px; border: none; border-radius: 6px; font-size: 1rem; }
        input, textarea { background: #444; color: #fff; width: 100%; resize: none; }
        input:focus, textarea:focus { outline: none; }
        button { background: #00a884; color: white; cursor: pointer; font-weight: bold; }
        .code-box { background: #333; padding: 10px; border-radius: 4px; text-align: center; font-family: monospace; font-size: 0.9rem; color: #00a884; word-break: break-all; max-height: 100px; overflow-y: auto; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">Chat</div>
    
    <div id="setup-area">
        <p style="text-align: center;">Schritt 1: Klicke auf "Erstellen" für deinen Friend Code</p>
        <button id="start-btn" onclick="initPeer(true)">Meinen Friend Code erstellen</button>
        <div id="my-code" class="code-box" style="display:none;">Generiere Code...</div>
        
        <hr style="border-color: #444; margin: 10px 0;">
        
        <p style="text-align: center;">Schritt 2: Friend Code des Freundes eingeben</p>
        <textarea id="friend-code" rows="4" placeholder="Code hier einfügen..."></textarea>
        <button id="connect-btn" onclick="connectToFriend()">Verbinden</button>
    </div>

    <div id="chat-area">
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="message-input" placeholder="Nachricht..." onkeypress="checkEnter(event)">
            <button onclick="sendMessage()">Senden</button>
        </div>
    </div>
</div>

<script>
    let p = null;

    function initPeer(isInitiator) {
        document.getElementById('start-btn').style.display = 'none';
        const codeBox = document.getElementById('my-code');
        codeBox.style.display = 'block';

        p = new SimplePeer({
            initiator: isInitiator,
            trickle: false
        });

        p.on('signal', data => {
            // Macht aus den Verbindungsdaten einen kompakten Text-Schlüssel (Friend Code)
            codeBox.innerText = btoa(JSON.stringify(data));
        });

        p.on('connect', () => {
            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('chat-area').style.display = 'flex';
        });

        p.on('data', data => {
            displayMessage(data.toString(), 'received');
        });
    }

    function connectToFriend() {
        const rawCode = document.getElementById('friend-code').value.trim();
        if (!rawCode) return;

        try {
            const decodedData = JSON.parse(atob(rawCode));
            
            if (!p) {
                // Falls du derjenige bist, der den Code empfängt, starte den Empfänger-Modus
                initPeer(false);
                setTimeout(() => { p.signal(decodedData); }, 500);
            } else {
                // Falls du den Code des anderen zurückbekommst
                p.signal(decodedData);
            }
        } catch (e) {
            alert('Ungültiger Friend Code!');
        }
    }

    function sendMessage() {
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        
        if (text && p) {
            p.send(text);
            displayMessage(text, 'sent');
            input.value = '';
        }
    }

    function displayMessage(text, type) {
        const messagesDiv = document.getElementById('messages');
        const msgElement = document.createElement('div');
        msgElement.classList.add('msg', type);
        msgElement.innerText = text;
        
        messagesDiv.appendChild(msgElement);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function checkEnter(event) {
        if (event.key === 'Enter') { sendMessage(); }
    }
</script>

</body>
</html>
